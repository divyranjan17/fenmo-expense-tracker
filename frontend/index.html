<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="page-header">
        <div>
          <h1>Expense Tracker</h1>
          <p>Track expenses with retry-safe submission.</p>
        </div>
        <button id="refresh-button" type="button">Refresh</button>
      </header>

      <section class="panel" aria-labelledby="form-title">
        <h2 id="form-title">New Expense</h2>
        <form id="expense-form" novalidate>
          <div class="form-grid">
            <label>
              Amount
              <input id="amount" name="amount" inputmode="decimal" autocomplete="off" placeholder="123.45" required>
            </label>
            <label>
              Category
              <input id="category" name="category" autocomplete="off" placeholder="Food" required>
            </label>
            <label>
              Date
              <input id="date" name="date" type="date" required>
            </label>
            <label class="description-field">
              Description
              <input id="description" name="description" autocomplete="off" placeholder="Lunch" required>
            </label>
          </div>
          <div class="form-actions">
            <button id="submit-button" type="submit">Add expense</button>
            <p id="submit-status" class="status" role="status" aria-live="polite"></p>
          </div>
        </form>
      </section>

      <section class="toolbar" aria-label="Expense controls">
        <label>
          Category
          <select id="category-filter">
            <option value="">All categories</option>
          </select>
        </label>
        <div class="total-box">
          <span>Total</span>
          <strong id="visible-total">0.00</strong>
        </div>
      </section>

      <section class="panel" aria-labelledby="list-title">
        <div class="list-header">
          <h2 id="list-title">Expenses</h2>
          <p id="list-status" class="status" role="status" aria-live="polite"></p>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Date</th>
                <th>Category</th>
                <th>Description</th>
                <th class="amount-cell">Amount</th>
              </tr>
            </thead>
            <tbody id="expense-rows">
              <tr>
                <td colspan="4" class="empty-cell">No expenses yet.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="/app.js" defer></script>
  </body>
</html>
